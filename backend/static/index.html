<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Document Intelligence Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --sidebar-bg: rgba(15, 23, 42, 0.8);
            --chat-bg: #1e293b;
            --user-bubble: #6366f1;
            --ai-bubble: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 300px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(12px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px;
            z-index: 10;
        }

        .sidebar h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 24px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .document-list {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .document-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 14px;
            color: #cbd5e1;
            transition: background 0.2s;
        }

        .document-item:hover {
            background: rgba(255,255,255,0.08);
        }

        .delete-btn {
            background: transparent;
            color: #ef4444;
            border: none;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            font-size: 16px;
        }
        .delete-btn:hover { background: rgba(239, 68, 68, 0.2); }

        .upload-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .upload-btn:hover { background: var(--primary-hover); }

        /* Main Chat Area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(15, 23, 42, 0.4);
            position: relative;
        }

        .header {
            padding: 16px 32px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        select {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid var(--border);
            padding: 10px 16px;
            border-radius: 8px;
            outline: none;
            font-family: inherit;
            cursor: pointer;
        }
        select option { background: var(--bg-dark); }

        .chat-window {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .message {
            max-width: 80%;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }

        .message.user {
            align-self: flex-end;
        }
        .message.ai {
            align-self: flex-start;
        }

        .bubble {
            padding: 16px 20px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 15px;
        }

        .message.user .bubble {
            background: var(--user-bubble);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.ai .bubble {
            background: var(--ai-bubble);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        /* Rendered Markdown inside AI bubble */
        .bubble code { background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px; }
        .bubble pre { background: rgba(0,0,0,0.5); padding: 12px; border-radius: 8px; overflow-x: auto; margin-top: 10px; }
        .bubble p { margin-bottom: 10px; }
        .bubble p:last-child { margin-bottom: 0; }

        .sources-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border);
            color: #a7f3d0;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 10px;
            align-self: flex-start;
        }

        .sources-panel {
            display: none;
            margin-top: 10px;
            background: rgba(0,0,0,0.3);
            border-left: 3px solid #10b981;
            padding: 12px;
            border-radius: 4px;
            font-size: 13px;
            color: #cbd5e1;
        }

        .input-area {
            padding: 24px 32px;
            background: rgba(15, 23, 42, 0.8);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 16px;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: white;
            padding: 16px 20px;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0 24px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .send-btn:hover { background: var(--primary-hover); }

        /* Spinner */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>📚 Documents</h2>
        <div class="document-list" id="docList">
            <!-- Documents injected here -->
        </div>
        
        <input type="file" id="fileInput" accept=".pdf,.txt,.log" style="display: none;" onchange="handleFileUpload()">
        <button class="upload-btn" id="uploadBtn" onclick="document.getElementById('fileInput').click()">
            <span id="uploadBtnText">+ Upload File</span>
        </button>
    </div>

    <!-- Main Chat Content -->
    <div class="main-content">
        <div class="header">
            <select id="sourceFilter">
                <option value="">🔍 Search All Documents</option>
                <!-- Filters injected here -->
            </select>
        </div>

        <div class="chat-window" id="chatWindow">
            <div class="message ai">
                <div class="bubble">
                    <p>Hello! I am your AI Document Intelligence assistant. Upload a file on the left, and ask me any questions about it!</p>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="queryInput" placeholder="Ask a question..." onkeypress="if(event.key === 'Enter') askQuestion()">
            </div>
            <button class="send-btn" id="sendBtn" onclick="askQuestion()">Send</button>
        </div>
    </div>

    <script>
        // Init
        document.addEventListener("DOMContentLoaded", () => {
            loadDocuments();
        });

        // ------------------ DOCUMENT MANAGEMENT ------------------
        async function loadDocuments() {
            try {
                let res = await fetch('/store/files');
                let data = await res.json();
                
                const docList = document.getElementById('docList');
                const filter = document.getElementById('sourceFilter');
                
                docList.innerHTML = '';
                // Preserve the "All Documents" option
                filter.innerHTML = '<option value="">🔍 Search All Documents</option>';

                if (data.files.length === 0) {
                    docList.innerHTML = '<div style="color: #64748b; font-size: 13px; text-align: center; margin-top: 20px;">No documents uploaded yet.</div>';
                    return;
                }

                data.files.forEach(file => {
                    // Add to sidebar
                    const div = document.createElement('div');
                    div.className = 'document-item';
                    div.innerHTML = `
                        <span style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">📄 ${file}</span>
                        <button class="delete-btn" onclick="deleteDocument('${file}')" title="Delete Index">×</button>
                    `;
                    docList.appendChild(div);

                    // Add to dropdown
                    const opt = document.createElement('option');
                    opt.value = file;
                    opt.innerText = `📄 ${file}`;
                    filter.appendChild(opt);
                });
            } catch (e) {
                console.error("Failed to load documents", e);
            }
        }

        async function deleteDocument(filename) {
            if(!confirm(`Are you sure you want to delete all vectors for ${filename}?`)) return;
            try {
                await fetch(`/store/files/${encodeURIComponent(filename)}`, { method: 'DELETE' });
                loadDocuments();
            } catch (e) {
                alert("Failed to delete document.");
            }
        }

        async function handleFileUpload() {
            const fileInput = document.getElementById('fileInput');
            if (!fileInput.files[0]) return;
            
            const btn = document.getElementById('uploadBtn');
            const btnText = document.getElementById('uploadBtnText');
            
            const formData = new FormData();
            formData.append("file", fileInput.files[0]);
            
            btnText.innerHTML = '<span class="spinner"></span> Processing...';
            btn.disabled = true;
            
            try {
                // Upload
                let res = await fetch('/upload/', {method: 'POST', body: formData});
                if(!res.ok) throw new Error(await res.text());
                let data = await res.json();
                let filepath = data.file_path;
                let filename = data.filename;
                
                // Extract
                btnText.innerHTML = '<span class="spinner"></span> Extracting...';
                res = await fetch('/extract/', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({file_path: filepath})
                });
                if(!res.ok) throw new Error(await res.text());
                data = await res.json();
                let text = data.text;
                
                // Chunk
                btnText.innerHTML = '<span class="spinner"></span> Chunking...';
                res = await fetch('/chunk/', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({text: text, filename: filename})
                });
                if(!res.ok) throw new Error(await res.text());
                data = await res.json();
                let chunks = data.chunks;
                
                // Embed & Store
                btnText.innerHTML = '<span class="spinner"></span> Indexing...';
                res = await fetch('/store/', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({filename: filename, chunks: chunks, source: filename.split('.').pop()})
                });
                if(!res.ok) throw new Error(await res.text());
                
                // Refresh list
                loadDocuments();
            } catch (error) {
                alert("Upload failed: " + (error.message || error));
            } finally {
                btnText.innerText = "+ Upload File";
                btn.disabled = false;
                fileInput.value = ''; // reset
            }
        }

        // ------------------ CHAT INTERFACE ------------------
        function appendMessage(role, text, sources = null) {
            const chatWindow = document.getElementById('chatWindow');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            
            if (role === 'ai') {
                // Render Markdown for AI responses
                bubble.innerHTML = marked.parse(text);
                msgDiv.appendChild(bubble);

                // Add Citations button if sources exist
                if (sources && sources.length > 0) {
                    const btn = document.createElement('button');
                    btn.className = 'sources-btn';
                    btn.innerText = `🔍 View References (${sources.length})`;
                    
                    const panel = document.createElement('div');
                    panel.className = 'sources-panel';
                    let panelHtml = '';
                    sources.forEach((s, i) => {
                        panelHtml += `<div style="margin-bottom:8px;"><strong>[${i+1}] ${s.source} (chunk ${s.chunk_id}):</strong><br/>${s.text}</div>`;
                    });
                    panel.innerHTML = panelHtml;

                    btn.onclick = () => {
                        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
                    };

                    msgDiv.appendChild(btn);
                    msgDiv.appendChild(panel);
                }
            } else {
                bubble.innerText = text;
                msgDiv.appendChild(bubble);
            }
            
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return msgDiv;
        }

        async function askQuestion() {
            const input = document.getElementById('queryInput');
            const query = input.value.trim();
            if (!query) return;
            
            const filterValue = document.getElementById('sourceFilter').value;
            
            input.value = '';
            appendMessage('user', query);
            
            // Temporary loading bubble
            const chatWindow = document.getElementById('chatWindow');
            const loadingMsg = document.createElement('div');
            loadingMsg.className = 'message ai';
            loadingMsg.innerHTML = '<div class="bubble"><span class="spinner" style="display:inline-block; border-color: var(--primary); border-top-color: transparent;"></span> Thinking...</div>';
            chatWindow.appendChild(loadingMsg);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            
            try {
                let res = await fetch('/query/', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        query: query, 
                        k: 5, 
                        source_filter: filterValue ? filterValue : null
                    })
                });
                
                if(!res.ok) throw new Error(await res.text());
                let data = await res.json();
                
                chatWindow.removeChild(loadingMsg);
                
                // Typewriter effect approach would be here, but for simplicity we render at once
                appendMessage('ai', data.answer, data.sources);
                
            } catch(e) {
                chatWindow.removeChild(loadingMsg);
                appendMessage('ai', "❌ **Error:** " + e.message);
            }
        }
    </script>
</body>
</html>
